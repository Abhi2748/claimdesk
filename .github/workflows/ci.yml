name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/ai/pyproject.toml

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install AI service dependencies
        working-directory: apps/ai
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Add AI venv to PATH
        run: echo "${{ github.workspace }}/apps/ai/.venv/bin" >> "$GITHUB_PATH"

      - name: Lint, typecheck, and test
        run: pnpm turbo run lint typecheck test

      - name: Check generated API types
        run: pnpm check:types

      - name: Ruff (apps/ai)
        working-directory: apps/ai
        run: ruff check .

      - name: Pytest (apps/ai)
        working-directory: apps/ai
        run: pytest

  eval-gate:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        needs.eval-paths.outputs.eval == 'true'
      )
    needs: eval-paths
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Warm up AI service (Render cold start)
        run: |
          for i in $(seq 1 12); do
            if curl -fsS "${{ secrets.AI_BASE_URL }}/health" >/dev/null; then
              echo "AI service is up."; exit 0
            fi
            echo "Waiting for AI service to wake... ($i)"; sleep 10
          done
          echo "AI service did not respond in time."; exit 1

      - name: Run eval gate
        env:
          EVAL_CI: "1"
          QA_TARGET: "remote"
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          EVAL_USER_EMAIL: ${{ secrets.EVAL_USER_EMAIL }}
          EVAL_USER_PASSWORD: ${{ secrets.EVAL_USER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DOC_ID: ${{ secrets.DOC_ID }}
        run: pnpm --filter web eval

  eval-paths:
    runs-on: ubuntu-latest
    outputs:
      eval: ${{ steps.filter.outputs.eval }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            eval:
              - 'apps/web/lib/qa/**'
              - 'apps/web/lib/tree/**'
              - 'apps/web/lib/retrieval-config.ts'
              - 'apps/web/eval/**'
              - 'apps/ai/app/**'
